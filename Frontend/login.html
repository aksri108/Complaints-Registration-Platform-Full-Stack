<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Complaint Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">ResolveIt</a>
        <div class="nav-links">
            <a href="login.html" class="active">Login</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <main>
        <div class="glass-card">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div id="generalError" class="error-msg text-center hidden" style="margin-bottom: 1rem;"></div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn" id="loginBtn">Login</button>
                
                <div class="text-center">
                    <p>Don't have an account? <a href="register.html">Register here</a></p>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ResolveIt. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
